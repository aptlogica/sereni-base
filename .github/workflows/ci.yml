name: CI
on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.24'
      - run: go mod tidy
      - run: go vet ./...
      - run: go test -v -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... ./tests/...
      - run: docker build .
