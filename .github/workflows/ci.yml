name: CI
on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go mod tidy
      - run: go vet ./...
      - run: go test ./... -coverprofile=coverage/coverage.out
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - run: docker build .
