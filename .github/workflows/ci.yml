name: CI
on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
      - run: go mod tidy
      - run: go vet ./...
      - run: go test -v -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... ./tests/...
      - run: docker build .
