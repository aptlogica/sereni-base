name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    # Run daily at 2 AM UTC to catch new vulnerabilities
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run go vet
        run: go vet ./...

      - name: Run gosec security scanner (install pinned version)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.13.0
          $(go env GOPATH)/bin/gosec -no-fail -fmt sarif -out gosec-results.sarif ./...
        continue-on-error: true

      - name: Upload gosec results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif
          category: gosec
        if: always()

      - name: Check for vulnerable Go modules
        run: |
          go install github.com/golang/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.9.2
        with:
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  dependency-vulnerabilities:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run Nancy (vulnerable dependencies scanner)
        run: |
          go install github.com/sonatype-nexus-community/nancy@latest
          go list -json -m all | nancy sleuth --loud
        continue-on-error: true

