events {
    worker_connections 1024;
}

http {
    # Rate limiting zone - must be in http block
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    
    # Upstream configuration
    upstream serenibase_backend {
        server serenibase-rest:8080;
        # Add health check and backup options
        keepalive 32;
    }

    server {
        listen 80;
        
        # Enable gzip compression
        gzip on;
        gzip_types text/plain application/json application/javascript text/css application/xml;
        gzip_min_length 1000;
        
        # Proxy timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # API routes with rate limiting
        location /api/v1/ {
            # Apply rate limiting
            limit_req zone=api burst=20 nodelay;
            
            # Proxy configuration
            proxy_pass http://serenibase_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Enable CORS
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Authorization, Accept, Content-Type";
            
            # Handle preflight requests
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Origin, Authorization, Accept, Content-Type";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 200;
            }
        }
        
        # Health check endpoint
        location /health {
            proxy_pass http://serenibase_backend/api/v1/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Additional location for root path (optional)
        location / {
            return 404;
        }
    }
}
