apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest-clone
  labels:
    app: postgrest-clone
spec:
  replicas: 3
  selector:
    matchLabels:
      app: postgrest-clone
  template:
    metadata:
      labels:
        app: postgrest-clone
    spec:
      containers:
      - name: postgrest-clone
        image: postgrest-clone:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_HOST
          value: "postgres-service"
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        livenessProbe:
          httpGet:
            path: /live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"