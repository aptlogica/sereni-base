info:
  contact:
    email: support@serenibase.com
    name: API Support Team
  description: |-
    Serenibase is a workspace management platform that layers guardrails on PostgreSQL tables and permissions.
    It centralizes workspace/base/table creation, membership, and asset/connectivity workflows along with RBAC controls.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Serenibase API
  version: "1.0"
paths:
  /asset/{id}:
    delete:
      consumes:
      - application/json
      description: Removes the asset record and underlying storage references for
        the given ID.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Asset deleted successfully
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — invalid id
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden — insufficient permissions
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — asset not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an asset
      tags:
      - Admin Asset
    patch:
      consumes:
      - application/json
      description: Updates the title or other metadata for an existing asset record.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AssetUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: Updated asset returned inside success.data
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — invalid asset ID
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — asset missing
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "422":
          description: Unprocessable Entity — invalid title
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update asset metadata
      tags:
      - Admin Asset
  /asset/bulk:
    post:
      consumes:
      - application/json
      description: Returns the metadata for the requested asset IDs so the UI can
        render thumbnails.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: List of asset IDs
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BulkAssetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Bulk assets returned inside data
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — empty ID list
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — some assets missing
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Retrieve a batch of assets
      tags:
      - Admin Asset
  /asset/upload:
    post:
      consumes:
      - multipart/form-data
      description: Accepts multipart files (images/documents) and stores them while
        validating size and type limits.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Files to upload
        in: formData
        name: files
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Stored assets list returned in success.data
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — invalid form or missing files
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "413":
          description: Payload Too Large — file exceeds limit
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload multiple assets
      tags:
      - Admin Asset
  /asset/upload-image:
    post:
      consumes:
      - multipart/form-data
      description: Accepts exactly one image file, validates the MIME type, and stores
        it alongside metadata.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Single image to upload
        in: formData
        name: files
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Stored image asset returned in success.data
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — missing image or invalid format
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "413":
          description: Payload Too Large — file exceeds size limit
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a single image asset
      tags:
      - Admin Asset
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Accepts a registered email, sends a reset token, and records the
        request to prevent spam.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Email address that owns the account
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset token issued
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — missing or invalid email
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — email not registered
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Start password reset flow
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Verifies the provided email/password pair and returns the refreshed
        login tokens plus the user profile when the credentials are correct.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Login payload with email and password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful, returns user details and tokens
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request — malformed JSON or missing required fields
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — invalid credentials
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "422":
          description: Unprocessable Entity — validation failed on one or more fields
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Authenticate with email and password
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidates the supplied refresh token so the session cannot be
        reused.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Refresh token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logout succeeded
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — missing field
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — token already invalid or missing
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Log out current session
      tags:
      - Auth
  /auth/otp/resend:
    post:
      consumes:
      - application/json
      description: Reissues one-time password SMS/email for the given verification
        token when the previous code expired or was lost.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Existing verification token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP resent successfully
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — missing or invalid token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — token already consumed
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "429":
          description: Too Many Requests — rate limit exceeded for OTP resends
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Resend throttled OTP
      tags:
      - Auth
  /auth/otp/verify:
    post:
      consumes:
      - application/json
      description: Consumes the OTP and token from the user to confirm ownership of
        the mailbox, then issues the standard login payload.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Token and OTP used for email verification
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Email verified and login response returned
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request — malformed token/OTP or missing parameters
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — OTP invalid or expired
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "422":
          description: Unprocessable Entity — validation failed
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Verify email via OTP
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a refresh token for a new access/refresh token pair so
        ongoing sessions stay authenticated.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New access and refresh tokens
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request — missing refresh token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — refresh token invalid or revoked
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "422":
          description: Unprocessable Entity — validation failed
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Refresh authentication tokens
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Validates the reset token and new password, updates the stored
        credentials, and invalidates the token.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Reset token and new password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password updated successfully
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — missing fields or invalid token format
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — token expired or already used
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "422":
          description: Unprocessable Entity — validation failed
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Reset password using token
      tags:
      - Auth
  /auth/validate-token:
    post:
      consumes:
      - application/json
      description: Checks whether a token is still valid and returns metadata about
        the owner.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Token to validate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TokenValidationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token validity and metadata
          schema:
            $ref: '#/definitions/dto.TokenValidationResponse'
        "400":
          description: Bad Request — malformed token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — token invalid
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "422":
          description: Unprocessable Entity — validation failed
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Validate a token
      tags:
      - Auth
  /auth/verify-token:
    post:
      consumes:
      - application/json
      description: Ensures the supplied token is authentic and returns the user metadata
        embedded within it.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Token to verify
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TokenValidationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token signature verified
          schema:
            $ref: '#/definitions/dto.TokenValidationResponse'
        "400":
          description: Bad Request — missing token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — token invalid or expired
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "422":
          description: Unprocessable Entity — validation failed
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Verify a token issued by the system
      tags:
      - Auth
  /base/{id}:
    delete:
      consumes:
      - application/json
      description: Removes the base record permanently from the schema.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Base ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Base deleted successfully
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request — invalid base id
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden — not allowed to delete base
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — base missing
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a base
      tags:
      - Admin Base
    get:
      consumes:
      - application/json
      description: Fetches the base identified by ID including visibility, config,
        and metadata.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Base ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Base retrieved successfully
          schema:
            $ref: '#/definitions/dto.BaseResponse'
        "400":
          description: Bad Request — invalid base id
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden — missing access
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — base missing
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get base details
      tags:
      - Admin Base
    put:
      consumes:
      - multipart/form-data
      description: Applies the form fields and optional uploaded image to update a
        base record.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Base ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BaseUpdate'
      - description: New base image
        in: formData
        name: image
        type: file
      - description: Pass true to drop the existing image
        in: formData
        name: remove_image
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Updated base data
          schema:
            $ref: '#/definitions/dto.BaseResponse'
        "400":
          description: Bad Request — invalid payload
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — invalid token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden — insufficient privileges
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — base missing
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update base metadata
      tags:
      - Admin Base
  /base/{id}/bulk-add-members:
    post:
      consumes:
      - application/json
      description: Adds multiple users to the provided base according to their requested
        base roles.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Base ID
        in: path
        name: id
        required: true
        type: string
      - description: Bulk membership payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BulkAddBaseMembersRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Bulk additions reported
          schema:
            $ref: '#/definitions/dto.BulkAddMembersResponse'
        "400":
          description: Bad Request — missing fields
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized — invalid token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden — insufficient privileges
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk add members to a base
      tags:
      - Admin Workspace
  /base/{id}/image:
    delete:
      consumes:
      - application/json
      description: Deletes the stored image for a base and returns the updated base
        metadata.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Base ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Image removed and base returned
          schema:
            $ref: '#/definitions/dto.BaseResponse'
        "400":
          description: Bad Request — invalid id
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden — insufficient privileges
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — base missing
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove base image
      tags:
      - Admin Base
    post:
      consumes:
      - multipart/form-data
      description: Attaches an image file to the base metadata and returns the updated
        base record.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Base ID
        in: path
        name: id
        required: true
        type: string
      - description: Image to upload
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Image stored and base returned
          schema:
            $ref: '#/definitions/dto.BaseResponse'
        "400":
          description: Bad Request — invalid id or missing image
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden — no permission to edit base image
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found — base missing
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a base image
      tags:
      - Admin Base
  /base/{id}/members:
    get:
      consumes:
      - application/json
      description: Returns all users attached to the base and their assigned roles.
      parameters:
      - description: Optional client-generated request trace ID
        in: header
        name: X-Request-ID
        type: string
      - description: Base ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Base members retrieved
          schema:
            items:
              $ref: '#/definitions/dto.WorkspaceMemberResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden — insufficient base access
