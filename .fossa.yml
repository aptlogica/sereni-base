version: 3

# Core project analysis configuration
analyze:
  modules:
    # Main Go application
    - name: serenibase-core
      type: go
      path: .
      strategy: manifest
      
    # Node.js UI service
    - name: serenibase-ui
      type: npm
      path: services/base-ui
      strategy: manifest

# License policy definition
licenses:
  # Define which licenses are allowed
  policies:
    - license: MIT
      principle: permissive
      compliance-type: permissive
      
    - license: Apache-2.0
      principle: permissive
      compliance-type: permissive
      
    - license: ISC
      principle: permissive
      compliance-type: permissive
      
    - license: BSD-2-Clause
      principle: permissive
      compliance-type: permissive
      
    - license: BSD-3-Clause
      principle: permissive
      compliance-type: permissive
      
    - license: Unlicense
      principle: permissive
      compliance-type: permissive
    
    # DENY copyleft licenses (GPL/AGPL)
    - license: GPL-2.0
      principle: copyleft
      compliance-type: restrict
      
    - license: GPL-2.0+
      principle: copyleft
      compliance-type: restrict
      
    - license: GPL-3.0
      principle: copyleft
      compliance-type: restrict
      
    - license: GPL-3.0+
      principle: copyleft
      compliance-type: restrict
      
    - license: AGPL-3.0
      principle: copyleft
      compliance-type: restrict
      
    - license: AGPL-3.0+
      principle: copyleft
      compliance-type: restrict
    
    # LGPL flagged (needs review but can be overridden)
    - license: LGPL-2.0
      principle: weak-copyleft
      compliance-type: flag
      
    - license: LGPL-2.1
      principle: weak-copyleft
      compliance-type: flag
      
    - license: LGPL-3.0
      principle: weak-copyleft
      compliance-type: flag

# Dependency-specific overrides
# Add here when you identify specific problematic packages
dependencies:
  # Example structure (uncomment and modify once you identify issues):
  # - name: github.com/some-package
  #   version: v1.2.3
  #   license: MIT
  #   
  # - name: @some-scope/package
  #   version: 1.0.0
  #   license: Apache-2.0

# Known false positives and noise to ignore
ignore:
  # Files that are not actually code dependencies
  - type: path
    pattern: "**/test/**"
    
  - type: path
    pattern: "**/docs/**"
    
  - type: path
    pattern: "**/examples/**"

# SBOM output for compliance
output:
  format: cyclonedx
  dir: sbom
